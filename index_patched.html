<script>
// Chunk loader for large files
async function loadChunks(cdnBase, filename, totalChunks) {
  const chunks = [];
  for (let i = 0; i < totalChunks; i++) {
    const chunkUrl = cdnBase + filename.replace('.data', '.part' + i.toString().padStart(2, '0') + '.bin')
                            .replace('.wasm', '.part' + i.toString().padStart(2, '0') + '.bin');
    const response = await fetch(chunkUrl);
    if (!response.ok) throw new Error('Failed to load chunk ' + i);
    chunks.push(await response.arrayBuffer());
  }
  // Concatenate all chunks
  const totalLength = chunks.reduce((acc, buf) => acc + buf.byteLength, 0);
  const result = new Uint8Array(totalLength);
  let offset = 0;
  for (const buf of chunks) {
    result.set(new Uint8Array(buf), offset);
    offset += buf.byteLength;
  }
  return result.buffer;
}

// Override createUnityInstance to handle chunked data
const originalCreateUnityInstance = window.createUnityInstance;
window.createUnityInstance = async function(canvas, config, progressCallback) {
  // Load chunks if needed
  if (config.dataUrl && config.dataUrl.includes('.part')) {
    const match = config.dataUrl.match(/(.+)\.part(\d+)\.bin/);
    if (match) {
      const baseUrl = match[1];
      const totalChunks = parseInt(match[2]) + 1;
      console.log('Loading data chunks: ' + totalChunks);
      const dataBuffer = await loadChunks(baseUrl + '.', '', totalChunks);
      config.dataUrl = dataBuffer;
    }
  }
  return originalCreateUnityInstance(canvas, config, progressCallback);
};
</script>
